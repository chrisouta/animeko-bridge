name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-windows-exe:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          choco upgrade wixtoolset --no-progress -y --install-if-not-installed

          $envPath = [System.Environment]::GetEnvironmentVariable("Path", "Machine")
          if ($envPath) {
            $env:Path = "$envPath;$env:Path"
          }

          $candle = Get-Command candle.exe -ErrorAction SilentlyContinue
          if (-not $candle) {
            $candidate = @(
              Get-ChildItem -Path "${env:ProgramFiles(x86)}\WiX Toolset v3.*\bin\candle.exe" -ErrorAction SilentlyContinue
              Get-ChildItem -Path "${env:ProgramFiles}\WiX Toolset v3.*\bin\candle.exe" -ErrorAction SilentlyContinue
              Get-ChildItem -Path "${env:ProgramFiles(x86)}\Windows Installer XML v3*\bin\candle.exe" -ErrorAction SilentlyContinue
              Get-ChildItem -Path "${env:ProgramFiles}\Windows Installer XML v3*\bin\candle.exe" -ErrorAction SilentlyContinue
            ) | Select-Object -First 1

            if (-not $candidate) {
              $candidate = Get-ChildItem -Path @("${env:ProgramFiles(x86)}", "${env:ProgramFiles}") -Filter candle.exe -File -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            }

            if (-not $candidate) {
              throw "WiX Toolset installation directory was not found."
            }

            $wixBin = Split-Path -Parent $candidate.FullName
          } else {
            $wixBin = Split-Path -Parent $candle.Source
          }

          $wixBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          Get-Command candle.exe

      - name: Run tests and build Windows EXE
        shell: pwsh
        run: .\gradlew.bat clean test packageReleaseExe

      - name: Upload Windows EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnimekoLocalMediaBridge-windows-exe
          path: build/compose/binaries/main-release/exe/*.exe
          if-no-files-found: error
